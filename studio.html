<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Studio | Linkore Creative Blueprint Engine</title>
    <style>
        /* Base Reset & Variables */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --bg-color: #0d0e12;
            --surface-color: #161820;
            --accent-glow: #00ffcc;
            --text-main: #ffffff;
            --text-muted: #8b949e;
            --border-color: #21262d;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
            padding: 0 4%;
        }

        /* --- Header & Navigation (Identical Layout to Home) --- */
        header {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            padding: 1.5rem 0;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            background: rgba(13, 14, 18, 0.8);
            backdrop-filter: blur(12px);
            z-index: 1000;
            gap: 1.5rem;
        }

        .brand-logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 4px;
            color: var(--text-main);
            transition: text-shadow 0.3s ease;
            white-space: nowrap;
        }

        .brand-logo a {
            color: var(--text-main);
            text-decoration: none;
        }

        .brand-logo span {
            color: var(--accent-glow);
        }

        .brand-logo:hover {
            text-shadow: 0 0 15px var(--accent-glow);
        }

        /* Centered Header Search Component */
        .search-container {
            justify-self: center;
            width: 100%;
            max-width: 380px;
        }

        .search-form {
            display: flex;
            position: relative;
            align-items: center;
        }

        .search-input {
            width: 100%;
            padding: 0.55rem 2.5rem 0.55rem 1.1rem;
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-main);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .search-input:focus {
            border-color: var(--accent-glow);
            box-shadow: 0 0 12px rgba(0, 255, 204, 0.15);
        }

        .search-submit-btn {

            right: 12px;
            background: none;
            border: none;
            cursor: pointer;
